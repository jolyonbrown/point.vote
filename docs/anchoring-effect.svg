<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-label="Anchoring effect per model: GPT-5.5 +1.45 deck steps (CI 1.10 to 1.78), Gemini 3.5 Flash +1.50 (CI 1.19 to 1.81), Claude Sonnet 5 +0.30 (CI -0.03 to 0.62). Zero means no effect.">
  <style>
    text { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .title { font-size: 17px; font-weight: 700; fill: #211c15; }
    .sub { font-size: 11.5px; fill: #6e6558; }
    .label { font-size: 13px; fill: #211c15; }
    .n { font-size: 11px; fill: #6e6558; }
    .val { font-size: 12.5px; font-weight: 700; fill: #211c15; }
    .tick { font-size: 11px; fill: #6e6558; }
    .note { font-size: 11px; fill: #6e6558; font-style: italic; }
  </style>
  <rect width="760" height="360" fill="#faf8f4"/>

  <text x="40" y="38" class="title">The anchor effect</text>
  <text x="40" y="58" class="sub">high-anchor mean − low-anchor mean, in deck steps · 95% bootstrap CI · fibonacci deck, 8 tickets</text>

  <!-- gridlines -->
  <g stroke="#e0d9cc" stroke-width="1">
    <line x1="366.7" y1="92" x2="366.7" y2="262"/>
    <line x1="477.8" y1="92" x2="477.8" y2="262"/>
    <line x1="588.9" y1="92" x2="588.9" y2="262"/>
    <line x1="700" y1="92" x2="700" y2="262"/>
  </g>
  <!-- zero line: the null -->
  <line x1="255.6" y1="86" x2="255.6" y2="268" stroke="#6e6558" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="255.6" y="80" class="tick" text-anchor="middle">no effect</text>

  <!-- axis ticks -->
  <g class="tick" text-anchor="middle">
    <text x="255.6" y="284">0</text>
    <text x="366.7" y="284">0.5</text>
    <text x="477.8" y="284">1.0</text>
    <text x="588.9" y="284">1.5</text>
    <text x="700" y="284">2.0</text>
  </g>
  <text x="700" y="302" class="tick" text-anchor="end">deck steps →</text>

  <!-- codex -->
  <text x="40" y="124" class="label">GPT-5.5</text>
  <text x="40" y="139" class="n">codex · n=40/arm</text>
  <line x1="500" y1="120" x2="651.1" y2="120" stroke="#b45309" stroke-width="2"/>
  <line x1="500" y1="114" x2="500" y2="126" stroke="#b45309" stroke-width="2"/>
  <line x1="651.1" y1="114" x2="651.1" y2="126" stroke="#b45309" stroke-width="2"/>
  <circle cx="577.8" cy="120" r="7" fill="#b45309" stroke="#faf8f4" stroke-width="2"/>
  <text x="577.8" y="103" class="val" text-anchor="middle">+1.45</text>

  <!-- gemini -->
  <text x="40" y="179" class="label">Gemini 3.5 Flash</text>
  <text x="40" y="194" class="n">agy · n=26–27/arm</text>
  <line x1="520" y1="175" x2="657.8" y2="175" stroke="#b45309" stroke-width="2"/>
  <line x1="520" y1="169" x2="520" y2="181" stroke="#b45309" stroke-width="2"/>
  <line x1="657.8" y1="169" x2="657.8" y2="181" stroke="#b45309" stroke-width="2"/>
  <circle cx="588.9" cy="175" r="7" fill="#b45309" stroke="#faf8f4" stroke-width="2"/>
  <text x="588.9" y="158" class="val" text-anchor="middle">+1.50</text>

  <!-- claude -->
  <text x="40" y="234" class="label">Claude Sonnet 5</text>
  <text x="40" y="249" class="n">claude -p · n=40/arm</text>
  <line x1="248.9" y1="230" x2="393.3" y2="230" stroke="#b45309" stroke-width="2"/>
  <line x1="248.9" y1="224" x2="248.9" y2="236" stroke="#b45309" stroke-width="2"/>
  <line x1="393.3" y1="224" x2="393.3" y2="236" stroke="#b45309" stroke-width="2"/>
  <circle cx="322.2" cy="230" r="7" fill="#b45309" stroke="#faf8f4" stroke-width="2"/>
  <text x="322.2" y="213" class="val" text-anchor="middle">+0.30</text>

  <text x="40" y="330" class="note">One visible “colleague’s vote” moved two of three models ~1.5 cards on an 8-card deck.</text>
  <text x="40" y="346" class="note">Across 212 anchored trials, zero estimates moved away from the anchor.</text>
</svg>
