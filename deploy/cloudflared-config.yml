# cloudflared config for the LOCALLY-MANAGED tunnel flow only.
#
# NOTE: production runs the dashboard (token) flow instead, where ingress
# lives in Cloudflare's remote config and this file is silently IGNORED —
# see deploy/README.md before assuming edits here do anything.
#
# For the locally-managed flow: this lives at /etc/cloudflared/config.yml
# on the Pi; cloudflared runs as its own systemd service. TLS terminates
# at the Cloudflare edge; no ports opened, home IP unexposed, works
# behind CGNAT.
#
# Setup (once):
#   cloudflared tunnel login
#   cloudflared tunnel create pointvote
#   cp <credentials json> /etc/cloudflared/pointvote.json
#   cloudflared tunnel route dns pointvote point.vote
#   sudo cloudflared --config /etc/cloudflared/config.yml service install

tunnel: pointvote
credentials-file: /etc/cloudflared/pointvote.json

ingress:
  - hostname: point.vote
    # 127.0.0.1 explicitly: the app binds IPv4 loopback only, and
    # localhost may resolve ::1 first.
    service: http://127.0.0.1:8080
  - service: http_status:404
